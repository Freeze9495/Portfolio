<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="particles"></canvas>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html">Accueil</a>
    <a href="projets.html">Projets</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>

  <!-- SECTION CONTACT -->
  <section class="contact-section fade-up">
    <h1 class="page-title">Entrons en Contact</h1>
    <p class="contact-intro">Je suis disponible pour discuter de projets, de collaborations ou répondre à vos questions.</p>

    <div class="contact-card">
      <form action="mailto:raphael.piechocki@gmail.com" method="post" enctype="text/plain">
        <input type="text" name="name" placeholder="Votre nom" required>
        <input type="email" name="email" placeholder="Votre email" required>
        <textarea name="message" placeholder="Votre message" required></textarea>
        <button type="submit" class="btn">Envoyer ✉️</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <a href="contact.html" class="footer-btn">✉️ Me Contacter</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
